# silly-chat runtime config (NON-SECRET). Secrets live in .env.
# This file is the single source of truth for models, endpoints, and caps.
# Change behavior by editing values here — no code edits.

[ollama]
# OpenAI-compatible endpoint. Local daemon: http://localhost:11434/v1
# Ollama Cloud: https://ollama.com/v1  (set OLLAMA_API_KEY in .env)
base_url = "http://localhost:11434/v1"

[models]
# Must be tool-capable. Orchestrator is where to spend on quality (routing/decomposition).
orchestrator = "deepseek-v4-pro:cloud"
# Cheap, narrow workers — local & free.
worker = "qwen3.5:9b"
# Must be vision-capable (deepseek-v4-pro has no vision).
vision = "gemini-3-flash-preview:latest"
# Writes code when the user asks for it; pick a strong coding model.
coder = "deepseek-v4-pro:cloud"
# Embedding model for document RAG (must be an embedding model, not a chat model).
embed = "nomic-embed-text:v1.5"

[maps]
# Free OpenStreetMap ecosystem (no API keys). Swap for self-hosted instances anytime.
nominatim_url = "https://nominatim.openstreetmap.org"
# {profile} = car | bike | foot (FOSSGIS OSRM). A plain OSRM base also works.
osrm_url = "https://routing.openstreetmap.de/routed-{profile}"
# Public transport routing (community-run MOTIS over open GTFS feeds).
transitous_url = "https://api.transitous.org"

[search]
# SearXNG instance reachable by the backend (json format must be enabled).
# Override per-environment via SEARCH__SEARXNG_URL in .env (e.g. a private instance).
searxng_url = "http://localhost:8080"

[limits]
# Caps for the image-verify flow (vision calls are the budget sink).
max_vision_candidates = 5
max_confirmed_hits = 3
# Most parallel research workers the orchestrator may spawn per turn.
max_agents = 4
# Hard cap on model round-trips per research worker (≈ 6 web searches) — stops runaway
# search loops from stalling a turn. The worker prompt also tells it to self-limit.
worker_request_limit = 8
# Per-user guardrails (Phase 4).
user_requests_per_minute = 20
# Retries for tool calls + structured-output validation (the repair pass).
output_retries = 4
# Code-preview hosting (open-in-new-tab): owner-only, temporary, capped.
preview_ttl_minutes = 30
preview_max_kb = 2048
preview_max_per_user = 20
# Attachments (uploaded images): recompressed on ingest; quotas + TTL keep disk in check.
upload_max_mb = 10
upload_image_max_dim = 1568
upload_user_quota_mb = 200
upload_global_quota_mb = 20000
upload_ttl_days = 7
# Documents (RAG): originals purged fast; extracted text chunks + embeddings live on.
doc_max_mb = 25
doc_file_ttl_days = 1
doc_chunk_chars = 1200
doc_chunk_overlap = 200
doc_max_chars = 400000
rag_top_k = 6

[db]
path = "data/silly.db"

[auth]
session_days = 30

[logging]
level = "INFO"  # set DEBUG for verbose tool/search tracing
