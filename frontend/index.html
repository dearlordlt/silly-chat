<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>silly-chat</title>
    <!-- PWA: installable to the home screen (standalone window) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0069c9" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      // Apply the saved theme palette before paint to avoid a flash.
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('silly:themeVars') || 'null');
          if (!s) return;
          // Auto theme: the cache carries both palettes — pick by the device theme.
          if (s.auto) s = matchMedia('(prefers-color-scheme: dark)').matches ? s.auto.dark : s.auto.light;
          var r = document.documentElement;
          for (var k in s.vars) r.style.setProperty('--' + k, s.vars[k]);
          r.classList.toggle('dark', !!s.dark);
          if (s.id) r.dataset.theme = s.id;
          r.style.colorScheme = s.scheme || (s.dark ? 'dark' : 'light');
          var rad = localStorage.getItem('silly:radius');
          if (rad) r.style.setProperty('--radius', rad);
          r.dataset.bg = localStorage.getItem('silly:bg') || 'none';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
