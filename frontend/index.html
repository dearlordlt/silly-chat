<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>silly-chat</title>
    <script>
      // Apply the saved theme palette before paint to avoid a flash.
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('silly:themeVars') || 'null');
          if (!s) return;
          var r = document.documentElement;
          for (var k in s.vars) r.style.setProperty('--' + k, s.vars[k]);
          r.classList.toggle('dark', !!s.dark);
          r.style.colorScheme = s.scheme || (s.dark ? 'dark' : 'light');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
