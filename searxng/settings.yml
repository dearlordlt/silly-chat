# Minimal SearXNG config. Merges over the image defaults.
use_default_settings: true

server:
  # Local instance behind app auth. Change for any internet-exposed deployment.
  secret_key: "change-me-silly-chat-dev-secret"
  # Disable the bot limiter so the backend can query the JSON API freely.
  limiter: false
  image_proxy: true

search:
  # json is OFF by default — this is the whole reason this file exists.
  formats:
    - html
    - json

# Datacenter-friendly networking: default 3s is too tight for VPS outbound, and
# DuckDuckGo hard-blocks datacenter IPs (every query would waste its timeout on it).
outgoing:
  request_timeout: 6.0
  max_request_timeout: 10.0

# Engine mix for datacenter IPs: DDG blocks them outright; Google rate-suspends
# under bursts (180s) — so keep several fallbacks enabled.
engines:
  - name: duckduckgo
    disabled: true
  - name: duckduckgo images
    disabled: true
  - name: bing
    disabled: false
  - name: mojeek
    disabled: false
  - name: wikipedia
    disabled: false
