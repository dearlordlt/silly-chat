# Base stack: backend + frontend + searxng. Used as-is for prod (VPS).
# `start.sh` runs this; `dev.sh` layers docker-compose.dev.yml on top.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      # Reach Ollama on the host by default; override in .env for cloud
      # (OLLAMA__BASE_URL=https://ollama.com/v1) or another host.
      OLLAMA__BASE_URL: ${OLLAMA__BASE_URL:-http://host.docker.internal:11434/v1}
      # Reach the searxng service over the compose network.
      SEARCH__SEARXNG_URL: http://searxng:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - searxng
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped
