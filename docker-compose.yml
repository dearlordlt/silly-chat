# Base stack: backend + frontend + searxng. Used as-is for prod (VPS).
# `start.sh` runs this; `dev.sh` layers docker-compose.dev.yml on top.
#
# Profiles (activated automatically by start.sh from .env):
#   public — Caddy on 80/443 with automatic HTTPS for $DOMAIN
#   embed  — CPU Ollama appliance that serves ONLY the embedding model
#            (Ollama Cloud has no embedding models)

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  backend:
    <<: *logging
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      # Reach Ollama on the host by default; override in .env for cloud
      # (OLLAMA__BASE_URL=https://ollama.com/v1) or another host.
      OLLAMA__BASE_URL: ${OLLAMA__BASE_URL:-http://host.docker.internal:11434/v1}
      # Reach the searxng service over the compose network.
      SEARCH__SEARXNG_URL: http://searxng:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - searxng
    # Persist the SQLite DB + uploaded files across image rebuilds. Without this,
    # `git pull && ./start.sh` (which rebuilds the backend) would wipe all accounts,
    # conversations, and attachments on every deploy.
    volumes:
      - silly-data:/srv/data
    restart: unless-stopped

  frontend:
    <<: *logging
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  searxng:
    <<: *logging
    image: searxng/searxng:latest
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped

  # --- profile: embed — embedding appliance (tiny model, CPU is plenty) ---
  ollama:
    <<: *logging
    image: ollama/ollama:latest
    profiles: ["embed"]
    environment:
      OLLAMA_KEEP_ALIVE: "-1" # keep the embed model resident
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: "2" # a burst of embeddings can't starve the rest of the box
    restart: unless-stopped

  # --- profile: public — HTTPS front door ---
  caddy:
    <<: *logging
    image: caddy:2-alpine
    profiles: ["public"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  silly-data: # backend SQLite DB + uploaded files (survives rebuilds/redeploys)
  ollama-models: # pulled embedding model weights
  caddy-data: # TLS certificates
  caddy-config:
